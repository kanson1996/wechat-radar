profile:
  background: "金融本科 + 西班牙商业分析硕士，现转型 AI PM。有投资/VC 领域认知基础，正在用 vibe coding（OpenClaw + Claude Code）构建 AI-native 产品。日常大量使用 AI 工具，对 AI 产品设计决策、成本/质量/延迟权衡有实践认知。"
  expertise_level: intermediate  # beginner / intermediate / advanced
  interests:
    - AI Agent 产品落地
    - AI 创业与商业化
    - 产品设计与用户体验
    - 科技行业趋势
    - VC 观点与投资逻辑
    - AI 新产品推荐与测评
    - 上海 AI 活动与 meetup
  preferences:
    prefer_practical: true
    avoid_marketing_hype: true
  custom: |
    - 正在做的项目：微信公众号 AI 筛选推送系统，关注相关技术方案和产品设计思路
    - 投资视角：对 VC 观点、投资人见解、AI 赛道投资逻辑、创业融资复盘感兴趣（经纬/红杉/真格/奇绩等）
    - AI 产品体验：关注 Product Hunt 级别的新 AI 产品推荐、产品测评、用户增长故事（未来计划做专门的产品体验模块）
    - AI 活动：关注上海地区的 AI 活动、meetup、hackathon、行业大会信息
    - 特别想看：AI Agent 实际应用案例、创业者真实复盘、有数据/案例支撑的深度分析
    - 偏好 prompt engineering、structured output、eval 等 AI 工程化话题
    - 不想看：纯融资新闻通稿、没有观点的信息搬运、"AI 将改变一切"的空泛预测


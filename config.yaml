profile:
  background: "简要描述你的背景，例如：计算机本科，3 年后端开发经验，目前在关注 AI 应用方向。"
  expertise_level: intermediate  # beginner / intermediate / advanced
  interests:
    - AI 技术趋势
    - 产品设计
    - 创业与商业化
    # 添加更多你感兴趣的领域...
  preferences:
    prefer_practical: true       # 偏好实操内容
    avoid_marketing_hype: true   # 过滤营销软文
  custom: |
    # 在这里补充更具体的偏好，帮助 AI 更精准地评分：
    # - 特别想看：xxx
    # - 不想看：xxx
    # - 关注的具体领域：xxx

preferences:
  # 合并模式: memory_only | custom_only | memory+custom
  merge_mode: custom_only

  # 来源1: 读取 memory 文件，自动提取偏好相关段落（可选）
  memory_files: []

  # 来源2: 自定义补充
  custom: |
    # 补充偏好（可选）

fetch:
  hours: 24             # 抓取最近 N 小时内的文章
  request_interval: 1.5 # 每次微信 API 请求间隔（秒），避免频率限制

branding:
  title: "微信公众号日报"           # 日报标题，会出现在所有推送渠道
  footer: "由 wechat-radar 自动生成" # 邮件页脚署名
  # banner: "assets/banner.png"    # 邮件 banner 头图路径（相对于项目目录或绝对路径），默认 assets/banner.png

ai:
  temperature: 0.3        # 评分 AI 温度（越低越稳定）
  intro_temperature: 0.5  # 开场白 AI 温度（越高越有创意）
  max_content_length: 4000  # 送入 AI 评分的正文最大字符数
  min_content_length: 50    # 正文少于此字数则跳过 AI 评分
  # intro_style: |         # 自定义开场白风格提示（取消注释后覆盖默认）
  #   像朋友聊天一样，挑一个最有意思的点展开

dedup:
  title_threshold: 0.5    # 标题相似度阈值（0-1，越高越严格）

prefilter:
  # 技术白名单：标题含这些关键词的文章不会被预过滤掉（正则，不区分大小写）
  tech_whitelist:
    - "GPT|GLM|Claude|Gemini|Llama|Qwen|DeepSeek"
    - "大模型|LLM|AI|人工智能|开源|模型|算法|Token|Agent|RAG"
    - "芯片|GPU|CUDA|Transformer|微调|Fine.?tune|Embedding"
  # 广告关键词组合（同时命中才过滤）
  ad_rules:
    - trigger: "限时"
      keywords: "折扣|优惠|特价|秒杀|抢购"
    - trigger: "免费领"
      keywords: "课程|资料|电子书|模板|工具包"

schedule:
  cron:
    - "0 9 * * *"    # 每天 09:00
    - "0 18 * * *"   # 每天 18:00
  log_file: /tmp/wechat-radar.log

scoring:
  # 评分维度：name + description + weight
  # 默认启用 4 个核心维度，可按需增删
  dimensions:
    relevance:
      description: "与用户兴趣的相关度（1=完全无关，10=高度匹配）"
      weight: 2
    depth:
      description: "思考深度（1=标题党/无内容，10=有独到洞察、商业框架、一手经验或深度调研）"
      weight: 1
    info_density:
      description: "信息密度（1=水文/大量废话，10=全篇干货）"
      weight: 1
    actionability:
      description: "可行动性（1=纯闲聊/纯资讯，10=读完能影响决策、启发行动方向）"
      weight: 2
    # ── 以下为可选维度，取消注释即可启用 ──
    # originality:
    #   description: "原创性（1=纯转载搬运，10=独家信息、一手数据、原创研究）"
    #   weight: 1
    # timeliness:
    #   description: "时效性（1=旧闻/常识，10=热点事件、最新发布、第一时间报道）"
    #   weight: 1
    # credibility:
    #   description: "可信度（1=无来源/道听途说，10=权威来源、有数据支撑、可验证）"
    #   weight: 1
    # entertainment:
    #   description: "趣味性（1=枯燥乏味，10=故事性强、引人入胜、有传播力）"
    #   weight: 1
  min_score: 5
  top_n: 20

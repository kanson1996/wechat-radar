accounts:
  # 添加你想关注的微信公众号名称，每行一个
  - 虎嗅APP
  - 机器之心
  - 少数派
  # - 更多公众号...

profile:
  background: "简要描述你的背景，例如：计算机本科，3 年后端开发经验，目前在关注 AI 应用方向。"
  expertise_level: intermediate  # beginner / intermediate / advanced
  interests:
    - AI 技术趋势
    - 产品设计
    - 创业与商业化
    # 添加更多你感兴趣的领域...
  preferences:
    prefer_practical: true       # 偏好实操内容
    avoid_marketing_hype: true   # 过滤营销软文
  custom: |
    # 在这里补充更具体的偏好，帮助 AI 更精准地评分：
    # - 特别想看：xxx
    # - 不想看：xxx
    # - 关注的具体领域：xxx

preferences:
  # 合并模式: memory_only | custom_only | memory+custom
  merge_mode: custom_only

  # 来源1: 读取 memory 文件，自动提取偏好相关段落（可选）
  memory_files: []

  # 来源2: 自定义补充
  custom: |
    # 补充偏好（可选）

scoring:
  weights:
    relevance: 2
    depth: 1
    info_density: 1
    actionability: 2
  min_score: 5
  top_n: 20
